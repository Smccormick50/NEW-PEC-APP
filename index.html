<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mc PCE</title>

<script>
(function () {
  function showBootError(detail) {
    var app = document.getElementById('app');
    if (!app || app.dataset.booted === '1') return; // real app already rendered fine
    app.innerHTML =
      '<div style="padding:24px;font-family:-apple-system,sans-serif;color:#1F2421;">' +
      '<strong style="font-size:16px;">The app hit an error while loading.</strong>' +
      '<p style="font-size:13px;color:#51585B;margin:10px 0 16px;">Please screenshot this whole message and send it back — it tells us exactly what went wrong.</p>' +
      '<pre style="white-space:pre-wrap;word-break:break-word;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:6px;padding:12px;font-size:12px;line-height:1.5;">' +
      String(detail).replace(/&/g, '&amp;').replace(/</g, '&lt;') +
      '</pre></div>';
  }
  window.addEventListener('error', function (e) {
    var msg = (e.error && e.error.stack) ? e.error.stack : (e.message + ' (' + e.filename + ':' + e.lineno + ':' + e.colno + ')');
    showBootError(msg);
  });
  window.addEventListener('unhandledrejection', function (e) {
    var reason = e.reason;
    showBootError('Unhandled promise rejection: ' + ((reason && reason.stack) ? reason.stack : String(reason)));
  });
  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () {
      var app = document.getElementById('app');
      if (app && app.dataset.booted !== '1' && !app.innerHTML.trim()) {
        showBootError('The app never finished loading and no specific error was reported. This usually means one of the script files (data.js, db.js, model.js, app.js) failed to load — double check all files from the zip were uploaded to the same folder.');
      }
    }, 6000);
  });
})();
</script>

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
<script src="localforage.min.js"></script>
<script src="jspdf.umd.min.js"></script>
<script src="pdf-lib.min.js"></script>
</head>
<body>

<div id="toast" class="toast" aria-live="polite"></div>

<div id="app"></div>

<!-- hidden file inputs, reused across views -->
<input type="file" id="photoInput" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt" multiple hidden>
<input type="file" id="photoCameraInput" accept="image/*" capture="environment" hidden>
<input type="file" id="importInput" accept="application/json" hidden>

<script src="data.js"></script>
<script src="db.js"></script>
<script src="model.js"></script>
<script src="pdf-export.js"></script>

</body>
</html>
